# Schema:
#   mappings: "yarn" (1.21.x — Yarn/Intermediary available) | "mojmap" (26.x — Mojang names only)
#   yarn_mappings: present only when mappings == yarn
#   notes: optional freeform per-row annotations (API bands, compat caveats, etc.)


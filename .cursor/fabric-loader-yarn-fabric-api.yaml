# Fabric version matrix — machine-readable coordinates for multi-version mc* builds.
# Optional companion to fabric-mod-build-release-guide-v4.3.md.
# Renamed from Fabric_Loader_Yarn_Fabric API.yaml (space in filename) in guide v4.3.
